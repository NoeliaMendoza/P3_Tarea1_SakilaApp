version: '3.8'

services:
    sakilaapp:
        image: sakilaapp:latest
        ports:
            - '5164:8080'
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_URLS=http://+:8080
            - ConnectionStrings__DefaultConnection=${SAKILAAPP_DEFAULT_CONNECTION}
            - ConnectionStrings__IdentityConnection=${SAKILAAPP_IDENTITY_CONNECTION}
            - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID}
            - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
            - EmailSettings__SmtpServer=${GMAIL_SMTP_SERVER}
            - EmailSettings__SmtpPort=${GMAIL_SMTP_PORT}
            - EmailSettings__SenderName=${GMAIL_SENDER_NAME}
            - EmailSettings__SenderEmail=${GMAIL_SENDER_EMAIL}
            - EmailSettings__Password=${GMAIL_PASSWORD}
            - PayPhone__Token=${PAYPHONE_TOKEN}
            - PayPhone__StoreId=${PAYPHONE_STORE_ID}
            - PayPal__ClientId=${PAYPAL_CLIENT_ID}
            - PayPal__ClientSecret=${PAYPAL_CLIENT_SECRET}
            - PayPal__BaseUrl=${PAYPAL_BASE_URL}
            - PayPal__ReturnUrl=${PAYPAL_RETURN_URL}
            - PayPal__CancelUrl=${PAYPAL_CANCEL_URL}
        depends_on:
            - postgres
        networks:
            - sakila-network
        deploy:
            replicas: 2
            update_config:
                parallelism: 1
                delay: 10s
                order: start-first
            restart_policy:
                condition: any
                delay: 5s
                max_attempts: 3
                window: 120s

    postgres:
        image: postgres:17
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./database/init-sakila.sh:/docker-entrypoint-initdb.d/init-sakila.sh
      - ./database/sakila_backup.sql:/docker-entrypoint-initdb.d/sakila_backup.sql
        ports:
            - '5433:5432'
        networks:
            - sakila-network
        deploy:
            replicas: 1
            placement:
                constraints:
                    - node.role == manager
            restart_policy:
                condition: any
            resources:
                limits:
                    memory: 512M

volumes:
    pgdata:
        driver: local

networks:
    sakila-network:
        driver: overlay
