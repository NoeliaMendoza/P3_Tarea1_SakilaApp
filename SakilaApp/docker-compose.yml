services:
  sakilaapp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5164:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=sakila;Username=postgres;Password=postgres
      - ConnectionStrings__IdentityConnection=Host=postgres;Port=5432;Database=sakiladb;Username=postgres;Password=postgres
      - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID}
      - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - EmailSettings__SmtpServer=${GMAIL_SMTP_SERVER}
      - EmailSettings__SmtpPort=${GMAIL_SMTP_PORT}
      - EmailSettings__SenderName=${GMAIL_SENDER_NAME}
      - EmailSettings__SenderEmail=${GMAIL_SENDER_EMAIL}
      - EmailSettings__Password=${GMAIL_PASSWORD}
      - PayPhone__Token=${PAYPHONE_TOKEN}
      - PayPhone__StoreId=${PAYPHONE_STORE_ID}
      - PayPal__ClientId=${PAYPAL_CLIENT_ID}
      - PayPal__ClientSecret=${PAYPAL_CLIENT_SECRET}
      - PayPal__BaseUrl=${PAYPAL_BASE_URL}
      - PayPal__ReturnUrl=${PAYPAL_RETURN_URL}
      - PayPal__CancelUrl=${PAYPAL_CANCEL_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sakila-network

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init-sakila.sh:/docker-entrypoint-initdb.d/init-sakila.sh
      - ./database/sakila_backup.sql:/docker-entrypoint-initdb.d/sakila_backup.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sakila-network

volumes:
  pgdata:

networks:
  sakila-network:
    driver: bridge
